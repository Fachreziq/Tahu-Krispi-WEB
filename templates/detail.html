{% extends 'base.html' %}

{% block title %}
{{ product.name }}
{% endblock %}

{% block content %}

<div class="top-bar">

    <a href="{{ url_for('product_list') }}" class="text-dark">
        <i class="bi bi-arrow-left fs-3"></i>
    </a>

    <h5 class="fw-bold">Detail Produk</h5>

    <a href="{{ url_for('checkout') }}" class="text-dark">
        <i class="bi bi-cart3 fs-3"></i>
    </a>

</div>

<div class="container pb-5">

    <div class="detail-image">

        <img
        src="{{ url_for('static', filename='img/' + product.image) }}"
        class="img-fluid rounded-4 shadow">

    </div>

    <div class="mt-4">

        <h2 class="fw-bold">
            {{ product.name }}
        </h2>

        <h3 class="text-warning mt-3">

            Rp {{ "{:,.0f}".format(product.price).replace(",", ".") }}

        </h3>

        <p class="text-muted mt-4">

            {{ product.description }}

        </p>

        <div class="mt-5">

            <a
            href="{{ url_for('add_to_cart', id=product.id) }}"
            class="btn btn-warning w-100 py-3 rounded-pill">

                <i class="bi bi-cart-plus"></i>

                Tambah ke Keranjang

            </a>

        </div>

    </div>

</div>

{% endblock %}
